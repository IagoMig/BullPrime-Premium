<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bull Prime Premium</title>
    <meta name="description" id="metaDescription" content="A Experiência Definitiva em Carnes Nobres">
    <link rel="stylesheet" href="../css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        .loading-screen {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
            color: var(--accent);
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(196, 139, 113, 0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .error-screen {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            padding: 2rem;
        }
        .error-screen h1 { font-family: 'Restweek', serif; font-size: 4rem; color: var(--accent); }

        /* ===== CINEMATIC SCROLL SNAP ===== */
        html {
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }
        .snap-section {
            scroll-snap-align: start;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        /* ===== BENTO GRID GLASS-MORPHISM ===== */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            grid-auto-rows: 300px;
            width: 100%;
        }
        .bento-item {
            background: rgba(12, 10, 8, 0.5);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2), inset 0 1px 0 0 rgba(255,255,255,0.05);
        }
        .bento-item:hover {
            transform: translateY(-5px);
            border-color: rgba(196,139,113,0.3);
            box-shadow: 0 20px 45px rgba(0,0,0,0.4), inset 0 1px 0 0 rgba(196,139,113,0.2);
        }
        .bento-item.span-2 { grid-column: span 2; }
        .bento-item.span-large { grid-column: span 2; grid-row: span 2; }
        .bento-item-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-size: cover;
            background-position: center;
            opacity: 0.4;
            z-index: 0;
            transition: transform 0.7s ease, opacity 0.4s ease;
        }
        .bento-item:hover .bento-item-bg {
            transform: scale(1.08);
            opacity: 0.6;
        }
        .bento-content {
            position: relative;
            z-index: 1;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 50%, transparent 100%);
            margin: -2.5rem;
            padding: 2.5rem;
            padding-top: 4rem;
        }
        .bento-title {
            font-family: 'Restweek', serif;
            font-size: 2rem;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }
        .bento-desc {
            font-size: 1.1rem;
            color: #ddd;
            line-height: 1.4;
        }
        @media (max-width: 1024px) {
            .bento-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            .bento-grid { grid-template-columns: 1fr; grid-auto-rows: 250px; }
            .bento-item.span-2, .bento-item.span-large { grid-column: span 1; grid-row: span 1; }
        }
    </style>
</head>
<body class="dark-theme">

    <!-- HEADER (Carregado pelo header.js) -->
    <div id="header"></div>

    <main class="main-content" id="dynamicContainer">
        <div class="loading-screen" id="loadingScreen">
            <div class="spinner"></div>
            <p>Carregando experiência...</p>
        </div>
    </main>

    <!-- FOOTER -->
    <div id="footer"></div>

    <script src="../js/supabase.js"></script>
    
    <script>
        let sb;

        async function loadDynamicPage() {
            let attempts = 0;
            while ((!window.BullPrimeDB || !window.BullPrimeDB.client) && attempts < 30) {
                await new Promise(r => setTimeout(r, 100));
                attempts++;
            }
            if (!window.BullPrimeDB || !window.BullPrimeDB.client) {
                showError('Erro ao inicializar o banco de dados.');
                return;
            }
            sb = window.BullPrimeDB.client;

            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('page');
            const container = document.getElementById('dynamicContainer');

            if (!slug) {
                showError('Página não encontrada.');
                return;
            }

            try {
                // 1. Fetch Page info
                const { data: page, error: pageError } = await sb
                    .from('pages')
                    .select('*')
                    .eq('slug', slug)
                    .eq('status', 'published')
                    .single();

                if (pageError || !page) throw new Error('Página não encontrada');

                document.title = page.meta_title || `${page.title} - Bull Prime Premium`;
                document.getElementById('metaDescription').content = page.meta_description || page.description;

                // Se a página foi construída com o GrapesJS (possui html_content)
                if (page.html_content) {
                    renderGrapesJsPage(page, container);
                    return;
                }

                // Fallback: Busca as Sections e Items (Sistema Antigo)
                const { data: sections, error: secError } = await sb
                    .from('page_sections')
                    .select(`
                        *,
                        section_items (*)
                    `)
                    .eq('page_id', page.id)
                    .order('sort_order', { ascending: true });

                if (secError && secError.code !== '42P01') {
                    // Ignore error if table doesn't exist, just pass empty array
                    throw secError;
                }

                renderPage(page, sections || [], container);

            } catch (err) {
                console.error(err);
                showError('Página não encontrada ou indisponível no momento.');
            }
        }

        function renderGrapesJsPage(page, container) {
            // Injeta o CSS salvo no head
            if (page.css_content) {
                const style = document.createElement('style');
                style.innerHTML = page.css_content;
                document.head.appendChild(style);
            }
            
            // Injeta o HTML diretamente no container
            container.innerHTML = page.html_content;
            
            // Re-initialize animations since DOM just changed
            if(window.BullPrimeAnimations) {
                window.BullPrimeAnimations.init();
            }

            // Corrige altura se a tela estiver muito curta
            container.style.minHeight = '100vh';
            container.style.display = 'block';
        }

        function renderPage(page, sections, container) {
            let html = '';

            if (!sections || sections.length === 0) {
                html = `
                    <section class="section-tight" style="padding-top: 10rem; min-height: 60vh;">
                        <div class="container text-center">
                            <h1 class="hero-title-sans text-accent-glow">${page.title}</h1>
                            <p class="mt-2" style="font-size: 1.2rem; color: #888;">${page.description || ''}</p>
                        </div>
                    </section>
                `;
                container.innerHTML = html;
                return;
            }

            sections.forEach(sec => {
                const config = sec.config || {};
                const items = (sec.section_items || []).sort((a,b) => a.sort_order - b.sort_order).map(item => {
                    let parsedContent = {};
                    try {
                        if (item.content) parsedContent = typeof item.content === 'string' ? JSON.parse(item.content) : item.content;
                    } catch(e) {}
                    return { ...item, ...parsedContent };
                });

                switch(sec.section_type) {
                    case 'hero':
                        const bgImg = config.background_image || '../../public/background-01.jpeg';
                        const heroTitle = config.title || page.title;
                        
                        html += `
                        <div class="snap-section hero-wrapper" style="position:relative;">
                            <section class="hero" style="position:absolute; inset:0; width:100%; height:100%;">
                                <div class="hero-bg" style="background-image: url('${bgImg}');"></div>
                                <div class="hero-overlay-deep"></div>
                                <div class="container hero-content" style="padding-top: 15rem; text-align: center; height:100%; display:flex; flex-direction:column; justify-content:center;">
                                    <h1 class="hero-title-group">
                                        <span class="hero-title-sans text-accent-glow">${heroTitle}</span>
                                    </h1>
                                    <p class="hero-description" style="max-width: 600px; margin: 0 auto; margin-top: 2rem;">
                                        ${config.description || page.description || ''}
                                    </p>
                                    ${config.cta_text ? `<a href="${config.cta_link || '#'}" class="btn-primary" style="margin: 3rem auto 0; display:inline-block;">${config.cta_text}</a>` : ''}
                                </div>
                            </section>
                        </div>
                        `;
                        break;
                    
                    case 'bento_grid':
                        html += `
                        <section class="snap-section section-tight" style="padding: 6rem 0; background: var(--bg-dark);">
                            <div class="container">
                                ${config.title ? `<div class="text-center mb-5">
                                    <h2 class="hero-title-sans text-accent-glow" style="font-size:3rem;">${config.title}</h2>
                                    ${config.subtitle ? `<p style="font-size:1.2rem; color:#888; margin-top:1rem;">${config.subtitle}</p>` : ''}
                                </div>` : ''}
                                <div class="bento-grid">
                        `;
                        
                        items.forEach((item) => {
                            let spanClass = '';
                            if (item.span === '2') spanClass = 'span-2';
                            if (item.span === 'large') spanClass = 'span-large';
                            
                            html += `
                                <div class="bento-item ${spanClass}">
                                    ${item.image_url ? `<div class="bento-item-bg" style="background-image: url('${item.image_url}')"></div>` : ''}
                                    <div class="bento-content">
                                        <h3 class="bento-title">${item.title || ''}</h3>
                                        <p class="bento-desc">${item.description || ''}</p>
                                    </div>
                                </div>
                            `;
                        });

                        html += `
                                </div>
                            </div>
                        </section>
                        `;
                        break;
                        
                    case 'text':
                        html += `
                        <section class="section-tight" style="padding: ${config.padding || '6rem 0'};">
                            <div class="container" style="max-width: 800px; margin: 0 auto; text-align: ${config.alignment || 'left'};">
                                ${config.title ? `<h2 class="section-title text-accent-glow" style="margin-bottom: 2rem;">${config.title}</h2>` : ''}
                                <div class="editorial-text" style="font-size: 1.1rem; line-height: 1.8;">
                                    ${config.content || ''}
                                </div>
                            </div>
                        </section>
                        `;
                        break;
                    
                    case 'gallery':
                        html += `
                        <section class="section-tight" style="padding: 6rem 0;">
                            <div class="container">
                                ${config.title ? `<div class="text-center mb-4"><h2 class="section-title">${config.title}</h2></div>` : ''}
                                <div class="editorial-grid">
                        `;
                        
                        items.forEach((item, index) => {
                            const spanClass = index === 0 ? 'ed-span-12' : 'ed-span-6';
                            html += `
                                <div class="${spanClass} masonry-card" style="min-height: 400px;">
                                    <img src="${item.image_url}" alt="${item.alt_text || ''}" style="width:100%; height:100%; object-fit:cover;">
                                </div>
                            `;
                        });
                        
                        html += `
                                </div>
                            </div>
                        </section>
                        `;
                        break;
                }
            });

            container.innerHTML = html;
        }

        function showError(msg) {
            document.getElementById('dynamicContainer').innerHTML = `
                <div class="error-screen">
                    <h1>404</h1>
                    <p style="font-size: 1.2rem; margin-bottom: 2rem; color: #888;">${msg}</p>
                    <a href="../../index.html" class="btn-primary">Voltar para a Home</a>
                </div>
            `;
        }

        document.addEventListener('DOMContentLoaded', loadDynamicPage);
    </script>
    <script src="../components/header.js"></script>
    <script src="../components/footer.js"></script>
    <script src="../js/animations.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 800,
            once: true,
            offset: 100
        });
    </script>
</body>
</html>
