<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bull Prime Premium</title>
    <meta name="description" id="metaDescription" content="A Experiência Definitiva em Carnes Nobres">
    <link rel="stylesheet" href="../css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .loading-screen {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
            color: var(--accent);
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(196, 139, 113, 0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .error-screen {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            padding: 2rem;
        }
        .error-screen h1 { font-family: 'Restweek', serif; font-size: 4rem; color: var(--accent); }
    </style>
</head>
<body class="dark-theme">

    <!-- HEADER (Carregado pelo header.js) -->
    <div id="header"></div>

    <main class="main-content" id="dynamicContainer">
        <div class="loading-screen" id="loadingScreen">
            <div class="spinner"></div>
            <p>Carregando experiência...</p>
        </div>
    </main>

    <!-- FOOTER -->
    <div id="footer"></div>

    <script src="../js/supabase.js"></script>
    
    <script>
        const SUPABASE_URL = 'https://vtkinxncxptlqspdzsbi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0a2lueG5jeHB0bHFzcGR6c2JpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzOTg4NjgsImV4cCI6MjA5OTk3NDg2OH0.tuUwIBLFjKz3o0gQVHU1lZDDUNq1-_N80Ds2_lOA8Kw';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadDynamicPage() {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('page');
            const container = document.getElementById('dynamicContainer');

            if (!slug) {
                showError('Página não encontrada.');
                return;
            }

            try {
                // 1. Fetch Page info
                const { data: page, error: pageError } = await sb
                    .from('pages')
                    .select('*')
                    .eq('slug', slug)
                    .eq('status', 'published')
                    .single();

                if (pageError || !page) throw new Error('Página não encontrada');

                document.title = page.meta_title || `${page.title} - Bull Prime Premium`;
                document.getElementById('metaDescription').content = page.meta_description || page.description;

                // 2. Fetch Sections and Items
                const { data: sections, error: secError } = await sb
                    .from('page_sections')
                    .select(`
                        *,
                        section_items (*)
                    `)
                    .eq('page_id', page.id)
                    .order('sort_order', { ascending: true });

                if (secError) throw secError;

                renderPage(page, sections, container);

            } catch (err) {
                console.error(err);
                showError('Página não encontrada ou indisponível no momento.');
            }
        }

        function renderPage(page, sections, container) {
            let html = '';

            if (!sections || sections.length === 0) {
                html = `
                    <section class="section-tight" style="padding-top: 10rem; min-height: 60vh;">
                        <div class="container text-center">
                            <h1 class="hero-title-sans text-accent-glow">${page.title}</h1>
                            <p class="mt-2" style="font-size: 1.2rem; color: #888;">${page.description || ''}</p>
                        </div>
                    </section>
                `;
                container.innerHTML = html;
                return;
            }

            sections.forEach(sec => {
                const config = sec.config || {};
                const items = (sec.section_items || []).sort((a,b) => a.sort_order - b.sort_order).map(item => {
                    let parsedContent = {};
                    try {
                        if (item.content) parsedContent = typeof item.content === 'string' ? JSON.parse(item.content) : item.content;
                    } catch(e) {}
                    return { ...item, ...parsedContent };
                });

                switch(sec.section_type) {
                    case 'hero':
                        const bgImg = config.bgImage || '../../public/background-01.jpeg';
                        const heroTitle = config.title || page.title;
                        
                        html += `
                        <div class="hero-wrapper">
                            <section class="hero" style="position:relative;">
                                <div class="hero-bg" style="background-image: url('${bgImg}');"></div>
                                <div class="hero-overlay-deep"></div>
                                <div class="container hero-content" style="padding-top: 15rem; text-align: center;">
                                    <h1 class="hero-title-group">
                                        <span class="hero-title-sans text-accent-glow">${heroTitle}</span>
                                    </h1>
                                    <p class="hero-description" style="max-width: 600px; margin: 0 auto; margin-top: 2rem;">
                                        ${config.subtitle || page.description || ''}
                                    </p>
                                </div>
                            </section>
                        </div>
                        `;
                        break;
                    
                    case 'text':
                        html += `
                        <section class="section-tight" style="padding: ${config.padding || '6rem 0'};">
                            <div class="container" style="max-width: 800px; margin: 0 auto; text-align: ${config.alignment || 'left'};">
                                ${config.title ? `<h2 class="section-title text-accent-glow" style="margin-bottom: 2rem;">${config.title}</h2>` : ''}
                                <div class="editorial-text" style="font-size: 1.1rem; line-height: 1.8;">
                                    ${config.content || ''}
                                </div>
                            </div>
                        </section>
                        `;
                        break;
                    
                    case 'gallery':
                        html += `
                        <section class="section-tight" style="padding: 6rem 0;">
                            <div class="container">
                                ${config.title ? `<div class="text-center mb-4"><h2 class="section-title">${config.title}</h2></div>` : ''}
                                <div class="editorial-grid">
                        `;
                        
                        items.forEach((item, index) => {
                            const spanClass = index === 0 ? 'ed-span-12' : 'ed-span-6';
                            html += `
                                <div class="${spanClass} masonry-card" style="min-height: 400px;">
                                    <img src="${item.image_url}" alt="${item.alt_text || ''}" style="width:100%; height:100%; object-fit:cover;">
                                </div>
                            `;
                        });
                        
                        html += `
                                </div>
                            </div>
                        </section>
                        `;
                        break;
                }
            });

            container.innerHTML = html;
        }

        function showError(msg) {
            document.getElementById('dynamicContainer').innerHTML = `
                <div class="error-screen">
                    <h1>404</h1>
                    <p style="font-size: 1.2rem; margin-bottom: 2rem; color: #888;">${msg}</p>
                    <a href="../../index.html" class="btn-primary">Voltar para a Home</a>
                </div>
            `;
        }

        document.addEventListener('DOMContentLoaded', loadDynamicPage);
    </script>
    <script src="../components/header.js"></script>
    <script src="../components/footer.js"></script>
</body>
</html>
