<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Páginas | Bull Prime Premium</title>
    <link rel="stylesheet" href="../../css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .page-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="sidebar-logo">
                <img src="/public/logo.png" style="height:40px; filter: drop-shadow(0 0 10px rgba(196,139,113,0.3));" alt="Bull Prime">
            </div>
            <nav class="sidebar-nav">
                <div class="sidebar-section-label">PRINCIPAL</div>
                <a href="dashboard.html" class="sidebar-link"><i class="fas fa-chart-line"></i> Dashboard</a>
                <a href="pages.html" class="sidebar-link active"><i class="fas fa-file-alt"></i> Páginas</a>
                <a href="media.html" class="sidebar-link"><i class="fas fa-images"></i> Mídia</a>

                <div class="sidebar-section-label">CONTEÚDO</div>
                <a href="blog.html" class="sidebar-link"><i class="fas fa-pen-nib"></i> Blog</a>
                <a href="cuts.html" class="sidebar-link"><i class="fas fa-utensils"></i> Catálogo</a>

                <div class="sidebar-section-label">NEGÓCIOS</div>
                <a href="units.html" class="sidebar-link"><i class="fas fa-store"></i> Unidades</a>
                <a href="events.html" class="sidebar-link"><i class="fas fa-calendar-alt"></i> Eventos</a>
                <a href="contacts.html" class="sidebar-link"><i class="fas fa-envelope"></i> Mensagens</a>

                <div class="sidebar-section-label">SISTEMA</div>
                <a href="settings.html" class="sidebar-link"><i class="fas fa-cog"></i> Configurações</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <header class="admin-topbar">
                <h2>Gerenciar Páginas</h2>
                <button class="btn btn-primary" onclick="openModal()">
                    <i class="fas fa-plus"></i> Nova Página
                </button>
            </header>

            <div id="pages-grid" class="page-grid">
                <!-- Pages will be inserted here -->
            </div>
        </main>
    </div>

    <!-- Modal Form -->
    <div id="page-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Nova Página</h3>
                <button class="btn-icon" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <form id="page-form" onsubmit="event.preventDefault();">
                    <input type="hidden" id="page-id">
                    <div class="form-group">
                        <label class="form-label">Título</label>
                        <input type="text" id="page-title" class="form-input" required onkeyup="generateSlug()">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Slug</label>
                        <input type="text" id="page-slug" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Descrição (Interna)</label>
                        <textarea id="page-desc" class="form-textarea" rows="2"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Meta Title (SEO)</label>
                        <input type="text" id="page-meta-title" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Meta Description (SEO)</label>
                        <textarea id="page-meta-desc" class="form-textarea" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Status</label>
                        <select id="page-status" class="form-select">
                            <option value="draft">Rascunho</option>
                            <option value="published">Publicado</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
                <button class="btn btn-primary" onclick="savePage()">Salvar</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script>
        const SUPABASE_URL = 'https://vtkinxncxptlqspdzsbi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0a2lueG5jeHB0bHFzcGR6c2JpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzOTg4NjgsImV4cCI6MjA5OTk3NDg2OH0.tuUwIBLFjKz3o0gQVHU1lZDDUNq1-_N80Ds2_lOA8Kw';
        let supabase; try { if(window.supabase) supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); else alert("Erro de conexão ao carregar o sistema."); } catch(e) { console.error(e); }

        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
            }
        }
        checkAuth();
        

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i> <span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('hiding');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function generateSlug() {
            const title = document.getElementById('page-title').value;
            const id = document.getElementById('page-id').value;
            // Only auto-generate if it's a new page (no id)
            if (!id) {
                const slug = title.toLowerCase()
                    .replace(/[áàâã]/g, 'a')
                    .replace(/[éèê]/g, 'e')
                    .replace(/[íï]/g, 'i')
                    .replace(/[óòôõ]/g, 'o')
                    .replace(/[úùü]/g, 'u')
                    .replace(/[ç]/g, 'c')
                    .replace(/[^a-z0-9\s-]/g, '')
                    .replace(/\s+/g, '-')
                    .replace(/-+/g, '-');
                document.getElementById('page-slug').value = slug;
            }
        }

        async function loadPages() {
            try {
                // In a real app we'd left join section counts, for now let's just fetch pages
                const { data: pages, error } = await supabase
                    .from('pages')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                renderPages(pages || []);
            } catch (error) {
                showToast('Erro ao carregar páginas', 'error');
            }
        }

        function renderPages(pages) {
            const grid = document.getElementById('pages-grid');
            grid.innerHTML = pages.map(page => `
                <div class="admin-card flex-col flex" style="flex-direction:column; gap:1rem;">
                    <div class="flex-between">
                        <h3 class="flex items-center gap-2">
                            ${page.title}
                            ${page.is_system ? '<i class="fas fa-lock text-muted text-sm" title="Página do Sistema"></i>' : ''}
                        </h3>
                        <span class="badge ${page.status === 'published' ? 'success' : 'warning'}">
                            ${page.status === 'published' ? 'Publicado' : 'Rascunho'}
                        </span>
                    </div>
                    <div class="text-sm text-muted">/${page.slug}</div>
                    
                    <div class="mt-2 pt-2 border-t" style="border-top: 1px solid var(--admin-border); display:flex; gap:1rem; flex-wrap:wrap;">
                        <button class="btn btn-secondary btn-sm" onclick="if(event) event.preventDefault(); openModal(JSON.parse(decodeURIComponent('${encodeURIComponent(JSON.stringify(page)).replace(/'/g, "%27")}')))">
                            <i class="fas fa-cog"></i> Configs
                        </button>
                        <a href="page-builder.html?id=${page.id}" class="btn btn-primary btn-sm">
                            <i class="fas fa-layer-group"></i> Editar Seções
                        </a>
                        ${!page.is_system ? `
                        <button class="btn btn-danger btn-sm" onclick="deletePage('${page.id}')">
                            <i class="fas fa-trash"></i>
                        </button>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        function openModal(page = null) {
            const modal = document.getElementById('page-modal');
            const title = document.getElementById('modal-title');
            const form = document.getElementById('page-form');
            
            form.reset();
            
            if (page) {
                title.textContent = 'Editar Página';
                document.getElementById('page-id').value = page.id;
                document.getElementById('page-title').value = page.title;
                document.getElementById('page-slug').value = page.slug;
                document.getElementById('page-desc').value = page.description || '';
                document.getElementById('page-meta-title').value = page.meta_title || '';
                document.getElementById('page-meta-desc').value = page.meta_description || '';
                document.getElementById('page-status').value = page.status;
                
                if (page.is_system) {
                    document.getElementById('page-slug').disabled = true;
                } else {
                    document.getElementById('page-slug').disabled = false;
                }
            } else {
                title.textContent = 'Nova Página';
                document.getElementById('page-id').value = '';
                document.getElementById('page-slug').disabled = false;
            }
            
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('page-modal').classList.remove('active');
        }

        async function savePage() {
            const id = document.getElementById('page-id').value;
            const pageData = {
                title: document.getElementById('page-title').value,
                slug: document.getElementById('page-slug').value,
                description: document.getElementById('page-desc').value,
                meta_title: document.getElementById('page-meta-title').value,
                meta_description: document.getElementById('page-meta-desc').value,
                status: document.getElementById('page-status').value
            };

            if (!pageData.title || !pageData.slug) {
                showToast('Preencha os campos obrigatórios', 'warning');
                return;
            }

            try {
                if (id) {
                    const { error } = await supabase
                        .from('pages')
                        .update(pageData)
                        .eq('id', id);
                    if (error) throw error;
                    showToast('Página atualizada!');
                } else {
                    pageData.is_system = false;
                    const { error } = await supabase
                        .from('pages')
                        .insert([pageData]);
                    if (error) throw error;
                    showToast('Página criada!');
                }
                
                closeModal();
                loadPages();
            } catch (error) {
                showToast('Erro ao salvar página: ' + error.message, 'error');
            }
        }

        async function deletePage(id) {
            if (!confirm('Tem certeza? Isso excluirá todas as seções e dados da página!')) return;
            
            try {
                const { error } = await supabase
                    .from('pages')
                    .delete()
                    .eq('id', id);
                if (error) throw error;
                
                showToast('Página excluída!');
                loadPages();
            } catch (error) {
                showToast('Erro ao excluir página', 'error');
            }
        }

        document.addEventListener('DOMContentLoaded', loadPages);
    </script>
    <script src="../../js/admin-sidebar.js"></script>
</body>
</html>
