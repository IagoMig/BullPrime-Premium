<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Builder PRO | Bull Prime Premium</title>
    <link rel="stylesheet" href="../../css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- GrapesJS Engine -->
    <link href="https://unpkg.com/grapesjs/dist/css/grapes.min.css" rel="stylesheet">
    <script src="https://unpkg.com/grapesjs"></script>

    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; transition: background 0.2s; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.25); }

        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0a0a0a; color: #fff; font-family: 'Inter', sans-serif; }

        /* App Layout */
        .app-layout {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Topbar */
        .builder-topbar {
            height: 60px;
            background: rgba(18, 18, 18, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.5);
            z-index: 100;
        }
        
        .builder-topbar .left-actions { display: flex; align-items: center; gap: 16px; }
        .builder-topbar h2 { margin: 0; font-size: 1.1rem; font-weight: 600; color: #fff; }

        .device-switcher {
            display: flex; gap: 8px; background: rgba(0,0,0,0.3); padding: 4px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);
        }
        .device-btn {
            background: transparent; border: none; color: rgba(255,255,255,0.4); padding: 6px 12px; border-radius: 8px; cursor: pointer; transition: all 0.2s;
        }
        .device-btn.active, .device-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

        /* Workspace */
        .builder-workspace {
            display: flex;
            flex: 1;
            height: calc(100vh - 60px);
        }

        /* Glass Panels */
        .panel {
            width: 300px;
            background: rgba(18, 18, 18, 0.55);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-right: 1px solid rgba(255, 255, 255, 0.06);
            border-left: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: inset 0 1px rgba(255, 255, 255, 0.02);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }
        .panel-left { border-left: none; }
        .panel-right { border-right: none; width: 340px; }

        /* Canvas Wrapper */
        .canvas-wrapper {
            flex: 1;
            position: relative;
            background: radial-gradient(circle at 50% 0%, rgba(255, 165, 100, 0.03) 0%, transparent 70%), rgba(10, 10, 10, 0.8);
            background-image: 
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center top;
            padding: 24px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Editor Overrides */
        .gjs-editor { background: transparent !important; }
        .gjs-cv-canvas {
            background: transparent;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Panel Headers / Tabs */
        .panel-tabs {
            display: flex;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .panel-tab {
            flex: 1; text-align: center; padding: 12px; cursor: pointer; color: rgba(255,255,255,0.5); font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s;
        }
        .panel-tab.active { color: #ffa564; border-bottom: 2px solid #ffa564; background: rgba(255,255,255,0.02); }
        .panel-tab:hover { color: #fff; }

        .panel-content { flex: 1; overflow-y: auto; padding: 16px; display: none; }
        .panel-content.active { display: block; }

        /* GrapesJS UI Overrides */
        .gjs-pn-panel { background: transparent !important; box-shadow: none !important; }
        .gjs-block { 
            width: 100% !important; min-height: auto !important; padding: 12px !important; 
            background: rgba(255,255,255,0.03) !important; border: 1px solid rgba(255,255,255,0.05) !important;
            border-radius: 12px !important; margin-bottom: 12px !important; color: #fff !important;
            transition: all 0.2s !important; display: flex !important; align-items: center !important; gap: 12px !important;
            text-align: left !important;
        }
        .gjs-block:hover { background: rgba(255,255,255,0.08) !important; border-color: rgba(255,165,100,0.4) !important; transform: translateY(-2px); }
        .gjs-block-label { font-size: 0.9rem !important; margin:0 !important; font-weight: 500 !important; }
        .gjs-block svg { width: 24px !important; height: 24px !important; fill: rgba(255,165,100,0.8) !important; }

        /* Styling the Style Manager */
        .gjs-sm-sector { border-top: 1px solid rgba(255,255,255,0.06) !important; }
        .gjs-sm-sector-title { background: rgba(0,0,0,0.2) !important; padding: 12px 16px !important; color: #fff !important; font-weight: 600 !important; letter-spacing: 1px !important; }
        .gjs-sm-property { margin-bottom: 12px !important; }
        .gjs-sm-label { color: rgba(255,255,255,0.6) !important; font-size: 0.8rem !important; text-transform: uppercase !important; }
        .gjs-field { background: rgba(0,0,0,0.4) !important; border: 1px solid rgba(255,255,255,0.1) !important; border-radius: 8px !important; color: #fff !important; padding: 4px 8px !important; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2) !important; }
        .gjs-field input, .gjs-field select { color: #fff !important; font-size: 0.9rem !important; }
        .gjs-sm-color-p { border-radius: 50% !important; border: 2px solid rgba(255,255,255,0.2) !important; }

        /* Layer Manager */
        .gjs-layer-title { color: rgba(255,255,255,0.8) !important; }
        .gjs-layer-active { background-color: rgba(255,165,100,0.1) !important; color: #ffa564 !important; border-radius: 6px !important; }

        /* Premium Buttons */
        .btn-primary {
            background: linear-gradient(135deg, rgba(255, 165, 100, 0.9), rgba(214, 115, 60, 0.9));
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 15px rgba(255, 165, 100, 0.2), inset 0 1px rgba(255, 255, 255, 0.2);
            color: #fff; font-weight: 600; padding: 8px 16px; border-radius: 10px; cursor: pointer; transition: all 0.2s;
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(255, 165, 100, 0.3); background: linear-gradient(135deg, rgba(255, 175, 115, 1), rgba(224, 125, 70, 1)); }
        
        .btn-secondary {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 8px 16px; border-radius: 10px; cursor: pointer; transition: all 0.2s; text-decoration: none; display:inline-block; font-size: 14px;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); }

    </style>
</head>
<body>
    <div class="app-layout">
        
        <!-- Topbar -->
        <header class="builder-topbar">
            <div class="left-actions">
                <a href="pages.html" class="btn-secondary"><i class="fas fa-arrow-left"></i> Sair</a>
                <h2 id="page-title-display">Carregando...</h2>
            </div>
            
            <div class="device-switcher">
                <button class="device-btn active" onclick="setDevice('Desktop')" title="Desktop"><i class="fas fa-desktop"></i></button>
                <button class="device-btn" onclick="setDevice('Tablet')" title="Tablet"><i class="fas fa-tablet-alt"></i></button>
                <button class="device-btn" onclick="setDevice('Mobile')" title="Mobile"><i class="fas fa-mobile-alt"></i></button>
            </div>

            <div class="right-actions" style="display:flex; gap:12px;">
                <button class="btn-secondary" onclick="editor.runCommand('core:undo')" title="Desfazer (Ctrl+Z)"><i class="fas fa-undo"></i></button>
                <button class="btn-secondary" onclick="editor.runCommand('core:redo')" title="Refazer (Ctrl+Y)"><i class="fas fa-redo"></i></button>
                <button class="btn-primary" onclick="savePageData()"><i class="fas fa-save"></i> Salvar (Ctrl+S)</button>
            </div>
        </header>

        <div class="builder-workspace">
            <!-- Left Sidebar -->
            <aside class="panel panel-left">
                <div class="panel-tabs">
                    <div class="panel-tab active" onclick="switchTab('left', 'blocks', this)">Elementos</div>
                    <div class="panel-tab" onclick="switchTab('left', 'layers', this)">Camadas</div>
                </div>
                <div id="tab-blocks" class="panel-content active">
                    <!-- GrapesJS Blocks will render here -->
                    <div id="blocks"></div>
                </div>
                <div id="tab-layers" class="panel-content">
                    <!-- GrapesJS Layer Manager -->
                    <div id="layers-container"></div>
                </div>
            </aside>

            <!-- Center Canvas -->
            <main class="canvas-wrapper">
                <div id="gjs"></div>
            </main>

            <!-- Right Sidebar -->
            <aside class="panel panel-right">
                <div class="panel-tabs">
                    <div class="panel-tab active" onclick="switchTab('right', 'styles', this)">Design</div>
                    <div class="panel-tab" onclick="switchTab('right', 'traits', this)">Configurações</div>
                </div>
                <div id="tab-styles" class="panel-content active">
                    <div id="styles-container"></div>
                </div>
                <div id="tab-traits" class="panel-content">
                    <div id="traits-container"></div>
                </div>
            </aside>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast-container" style="position:fixed; bottom:20px; right:20px; z-index:9999;"></div>

    <script src="../../js/supabase.js"></script>
    <script>
        let editor;
        let pagesDbClient;
        const urlParams = new URLSearchParams(window.location.search);
        const pageId = urlParams.get('id');

        function showToast(msg, type='success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.style = `background: ${type==='success'?'#2e7d32':'#d32f2f'}; color:white; padding:12px 24px; border-radius:8px; margin-top:10px; box-shadow:0 10px 30px rgba(0,0,0,0.3); font-weight:500; animation:slideIn 0.3s ease;`;
            toast.innerHTML = msg;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(()=>toast.remove(), 300); }, 3000);
        }

        function switchTab(side, tabId, element) {
            document.querySelectorAll(`.panel-${side} .panel-tab`).forEach(el => el.classList.remove('active'));
            document.querySelectorAll(`.panel-${side} .panel-content`).forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            document.getElementById(`tab-${tabId}`).classList.add('active');
        }

        async function initApp() {
            try {
                let attempts = 0;
            while ((!window.BullPrimeDB || !window.BullPrimeDB.client) && attempts < 30) {
                await new Promise(r => setTimeout(r, 100)); attempts++;
            }
            pagesDbClient = window.BullPrimeDB.client;
            
            if(!pageId) { alert("ID não fornecido"); window.location.href="pages.html"; return; }
            
            // Init GrapesJS
            editor = grapesjs.init({
                container: '#gjs',
                height: '100%',
                width: '100%',
                fromElement: true,
                storageManager: false, // We will handle saving manually via Supabase
                panels: { defaults: [] }, // Disable default panels
                blockManager: {
                    appendTo: '#blocks',
                },
                layerManager: {
                    appendTo: '#layers-container'
                },
                styleManager: {
                    appendTo: '#styles-container',
                    sectors: [
                        { name: 'Dimensões', open: false, buildProps: ['width', 'height', 'max-width', 'min-height', 'margin', 'padding'] },
                        { 
                            name: 'Tipografia', 
                            open: false, 
                            buildProps: ['font-family', 'font-size', 'font-weight', 'letter-spacing', 'color', 'line-height', 'text-align', 'text-shadow'],
                            properties: [
                                {
                                    property: 'font-family',
                                    list: [
                                        { value: '"Restweek", serif', name: 'Restweek (Premium)' },
                                        { value: '"Lato", sans-serif', name: 'Lato' }
                                    ]
                                }
                            ]
                        },
                        { name: 'Posicionamento (Flex)', open: false, buildProps: ['display', 'flex-direction', 'justify-content', 'align-items', 'flex-wrap', 'position', 'top', 'right', 'bottom', 'left', 'z-index'] },
                        { name: 'Decoração', open: false, buildProps: ['background-color', 'background-image', 'border-radius', 'border', 'box-shadow', 'opacity'] },
                        { name: 'Efeitos Premium', open: false, properties: [
                            { name: 'Glass Blur', property: 'backdrop-filter', type: 'text', default: 'blur(10px)' },
                            { name: 'Transição', property: 'transition', type: 'text', default: 'all 0.3s ease' }
                        ]}
                    ]
                },
                traitManager: {
                    appendTo: '#traits-container',
                },
                deviceManager: {
                    devices: [
                        { name: 'Desktop', width: '' },
                        { name: 'Tablet', width: '768px', widthMedia: '992px' },
                        { name: 'Mobile', width: '375px', widthMedia: '480px' }
                    ]
                },
                canvas: {
                    styles: [
                        'https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap',
                        '../../css/styles.css' // Inject project styles inside canvas
                    ],
                }
            });

            // Register Custom Blocks
            const bm = editor.BlockManager;
            
            bm.add('hero-section', {
                label: 'Hero Premium',
                category: 'Seções',
                content: `
                    <section data-gjs-type="default" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; background-image: url('../../../public/background-01.jpeg'); background-size: cover; background-position: center; color: #fff; padding: 40px; position: relative; z-index: 50;">
                        <div style="position:absolute; inset:0; background: linear-gradient(to top, rgba(10,10,10,1) 0%, rgba(10,10,10,0.4) 100%); pointer-events: none;"></div>
                        <div style="z-index: 2; max-width: 800px; position:relative;">
                            <h1 style="font-family: 'Restweek', serif; font-size: 5rem; color: #C48B71; margin-bottom: 20px;" data-aos="fade-up">Título Incrível</h1>
                            <p style="font-size: 1.25rem; color: rgba(255,255,255,0.7); margin-bottom: 40px;" data-aos="fade-up" data-aos-delay="100">Uma descrição cativante para converter seus clientes instantaneamente com design premium.</p>
                            <a href="#" style="background: #C48B71; color: #fff; padding: 15px 30px; border-radius: 8px; text-decoration: none; font-weight: 600;" data-aos="zoom-in" data-aos-delay="200">Começar Agora</a>
                        </div>
                    </section>
                `
            });
            
            bm.add('bento-grid-section', {
                label: 'Bento Grid',
                category: 'Seções',
                content: `
                    <section style="padding: 6rem 24px; background: #0a0a0a; position: relative; z-index: 50;">
                        <div style="max-width:1200px; margin:0 auto;">
                            <div style="text-align:center; margin-bottom:3rem;" data-aos="fade-up">
                                <h2 style="font-family:'Restweek',serif; font-size:3rem; color:#C48B71;">Descubra Mais</h2>
                            </div>
                            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem;">
                                <div style="background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 2.5rem; min-height: 350px; display:flex; flex-direction:column; justify-content:flex-end;" data-aos="fade-up" data-aos-delay="100">
                                    <h3 style="font-family:'Restweek',serif; font-size:2rem; color:#C48B71; margin:0 0 10px 0;">Item 1</h3>
                                </div>
                                <div style="background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 2.5rem; min-height: 350px; display:flex; flex-direction:column; justify-content:flex-end;" data-aos="fade-up" data-aos-delay="200">
                                    <h3 style="font-family:'Restweek',serif; font-size:2rem; color:#C48B71; margin:0 0 10px 0;">Item 2</h3>
                                </div>
                                <div style="background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 2.5rem; min-height: 350px; display:flex; flex-direction:column; justify-content:flex-end;" data-aos="fade-up" data-aos-delay="300">
                                    <h3 style="font-family:'Restweek',serif; font-size:2rem; color:#C48B71; margin:0 0 10px 0;">Item 3</h3>
                                </div>
                            </div>
                        </div>
                    </section>
                `
            });

            bm.add('glass-container', {
                label: 'Container Glass',
                category: 'Estrutura',
                content: `
                    <div style="background: rgba(255,255,255,0.05); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 40px; max-width: 1200px; margin: 40px auto; color:#fff; position: relative; z-index: 50;">
                        <h3 style="margin-top:0; font-family:'Restweek',serif; color:#C48B71;">Glass Container</h3>
                        <p>Arraste elementos para cá.</p>
                    </div>
                `
            });

            bm.add('grid-2', {
                label: 'Grid 2 Colunas',
                category: 'Estrutura',
                content: `
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; padding: 20px; position: relative; z-index: 50;">
                        <div style="min-height: 100px; background: rgba(255,255,255,0.05); border-radius: 8px;"></div>
                        <div style="min-height: 100px; background: rgba(255,255,255,0.05); border-radius: 8px;"></div>
                    </div>
                `
            });

            bm.add('text', {
                label: 'Texto Livre',
                category: 'Básicos',
                content: '<div style="color: #fff; font-size:1rem; padding:10px; position: relative; z-index: 50; font-family: \'Lato\', sans-serif;">Insira seu texto aqui. (Duplo clique para editar)</div>'
            });

            bm.add('image', {
                label: 'Imagem',
                category: 'Básicos',
                content: { type: 'image', style: { position: 'relative', 'z-index': 50 } }
            });
            
            bm.add('button', {
                label: 'Botão Padrão',
                category: 'Básicos',
                content: '<a href="#" style="display:inline-block; background:#C48B71; color:#fff; padding:10px 20px; border-radius:8px; text-decoration:none; position: relative; z-index: 50; font-family:\'Restweek\', serif;">Clique Aqui</a>'
            });

            // Keyboard Shortcuts
            editor.Keymaps.add('core:save', '⌘+s, ctrl+s', () => {
                savePageData();
                return false; // Prevent browser save
            });

            // Add global traits for AOS Animations
            const defaultType = editor.DomComponents.getType('default');
            defaultType.model.prototype.defaults.traits.push(
                {
                    type: 'select',
                    label: 'Animação Scroll',
                    name: 'data-aos',
                    options: [
                        { value: '', name: 'Nenhuma' },
                        { value: 'fade-up', name: 'Surgir Subindo' },
                        { value: 'fade-down', name: 'Surgir Descendo' },
                        { value: 'fade-left', name: 'Surgir da Direita' },
                        { value: 'fade-right', name: 'Surgir da Esquerda' },
                        { value: 'zoom-in', name: 'Zoom Entrada' },
                        { value: 'flip-left', name: 'Girar Esquerda' }
                    ]
                },
                {
                    type: 'number',
                    label: 'Atraso Animação (ms)',
                    name: 'data-aos-delay',
                    placeholder: 'Ex: 200'
                }
            );

            // Inject Custom Styles into Canvas so overlays don't block editing
            editor.on('load', () => {
                const style = editor.Canvas.getDocument().createElement('style');
                style.innerHTML = `
                    /* Make overlays ignore clicks so user can select text/images underneath */
                    .hero-overlay-deep, .masonry-overlay, .diff-card-overlay, .ed-content-overlay, .section-blurred-bg, [style*="z-index: 0"], [style*="z-index: 1"] {
                        pointer-events: none !important;
                    }
                    /* Ensure all text blocks can be clicked */
                    .masonry-content, .diff-card-content, .hero-content {
                        pointer-events: auto !important;
                        position: relative;
                        z-index: 20;
                    }
                    /* Force animated elements to be visible in the editor */
                    .reveal-blur, [data-aos] {
                        opacity: 1 !important;
                        filter: none !important;
                        transform: none !important;
                    }
                `;
                editor.Canvas.getDocument().head.appendChild(style);
            });

            await loadPageData();
            } catch (err) {
                console.error("FATAL ERROR IN INIT:", err);
                alert("Erro crítico ao inicializar: " + (err.stack || err.message || err));
            }
        }

        window.setDevice = function(device) {
            editor.setDevice(device);
            document.querySelectorAll('.device-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        async function loadPageData() {
            try {
                const { data, error } = await pagesDbClient.from('pages').select('*').eq('id', pageId).single();
                if(error) throw error;
                
                document.getElementById('page-title-display').innerText = `Builder: ${data.title}`;

                if (data.grapesjs_data) {
                    // Load full project data (JSON containing components and styles)
                    editor.loadProjectData(data.grapesjs_data);
                } else if (data.html_content) {
                    // Fallback to pure HTML if JSON doesn't exist
                    editor.setComponents(data.html_content);
                    editor.setStyle(data.css_content || '');
                } else {
                    // MIGRATION FEATURE: Load old sections if they exist
                    await migrateOldPageToGrapes(pageId, data);
                }
            } catch (e) {
                console.error(e);
                showToast("Erro ao carregar os dados da página.", "error");
            }
        }

        async function migrateOldPageToGrapes(pageId, pageData) {
            try {
                showToast("Migrando página antiga para o novo sistema...", "warning");
                const { data: sections, error } = await pagesDbClient
                    .from('page_sections')
                    .select('*, section_items(*)')
                    .eq('page_id', pageId)
                    .order('sort_order', { ascending: true });

                if (error || !sections || sections.length === 0) {
                    showToast("Aplicando template padrão premium...", "success");
                    try {
                        // Faz o fetch da home original para usar como ponto de partida
                        const response = await fetch('../../../index.html');
                        if (response.ok) {
                            const text = await response.text();
                            const parser = new DOMParser();
                            const doc = parser.parseFromString(text, 'text/html');
                            
                            // Remove elementos estáticos que não devem ir pro builder (Header, Footer, Scripts)
                            doc.querySelector('#header')?.remove();
                            doc.querySelector('#footer')?.remove();
                            doc.querySelectorAll('script').forEach(s => s.remove());
                            
                            // Pega o conteúdo final
                            let defaultHtml = doc.body.innerHTML.trim();
                            
                            // Ajusta os caminhos relativos (imagens e links) para funcionarem dentro do builder
                            defaultHtml = defaultHtml.replace(/(['"\(])public\//g, '$1../../../public/');
                            defaultHtml = defaultHtml.replace(/(['"\(])src\//g, '$1../../../src/');
                            
                            // Injeta no canvas
                            editor.setComponents(defaultHtml);
                        } else {
                            showToast("Página em branco. Pode começar a editar!");
                        }
                    } catch(e) {
                        console.error("Erro ao puxar template:", e);
                        showToast("Página em branco. Pode começar a editar!");
                    }
                    return;
                }

                let html = '';

                sections.forEach(sec => {
                    const config = sec.config || {};
                    const items = (sec.section_items || []).sort((a,b) => a.sort_order - b.sort_order).map(item => {
                        let parsed = {};
                        try { if(item.content) parsed = typeof item.content === 'string' ? JSON.parse(item.content) : item.content; } catch(e){}
                        return { ...item, ...parsed };
                    });

                    if (sec.section_type === 'hero') {
                        const bgImg = config.background_image || '../../public/background-01.jpeg';
                        const heroTitle = config.title || pageData.title;
                        html += `
                        <div class="snap-section hero-wrapper" style="position:relative; width:100%;">
                            <section class="hero" style="position:absolute; inset:0; width:100%; height:100%;">
                                <div class="hero-bg" style="background-image: url('${bgImg}'); background-size: cover; background-position: center; position:absolute; inset:0;"></div>
                                <div class="hero-overlay-deep" style="position:absolute; inset:0; background: linear-gradient(to top, rgba(10,10,10,1) 0%, rgba(10,10,10,0.4) 100%);"></div>
                                <div class="container hero-content" style="position:relative; z-index:10; padding-top: 15rem; text-align: center; height:100%; display:flex; flex-direction:column; justify-content:center;">
                                    <h1 style="font-family:'Restweek',serif; font-size:4rem; color:#C48B71;">${heroTitle}</h1>
                                    <p style="font-size:1.2rem; color:#fff; max-width: 600px; margin: 2rem auto 0;">${config.description || pageData.description || ''}</p>
                                    ${config.cta_text ? `<a href="${config.cta_link || '#'}" style="margin: 3rem auto 0; display:inline-block; background:#C48B71; padding:12px 24px; color:#fff; border-radius:8px; text-decoration:none;">${config.cta_text}</a>` : ''}
                                </div>
                            </section>
                        </div>`;
                    } else if (sec.section_type === 'text') {
                        html += `
                        <section class="section-tight" style="padding: ${config.padding || '6rem 0'}; background:#0a0a0a;">
                            <div class="container" style="max-width: 800px; margin: 0 auto; text-align: ${config.alignment || 'left'}; color:#fff;">
                                ${config.title ? `<h2 style="font-family:'Restweek',serif; font-size:3rem; color:#C48B71; margin-bottom: 2rem;">${config.title}</h2>` : ''}
                                <div style="font-size: 1.1rem; line-height: 1.8;">${config.content || ''}</div>
                            </div>
                        </section>`;
                    } else if (sec.section_type === 'bento_grid') {
                        html += `
                        <section style="padding: 6rem 24px; background: #0a0a0a;">
                            <div style="max-width:1200px; margin:0 auto;">
                                ${config.title ? `<div style="text-align:center; margin-bottom:3rem;"><h2 style="font-family:'Restweek',serif; font-size:3rem; color:#C48B71;">${config.title}</h2></div>` : ''}
                                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem;">
                        `;
                        items.forEach(item => {
                            html += `
                            <div style="background: rgba(255,255,255,0.05); border-radius: 16px; padding: 2.5rem; position:relative; overflow:hidden; min-height:300px; display:flex; flex-direction:column; justify-content:flex-end;">
                                ${item.image_url ? `<div style="position:absolute; inset:0; background-image:url('${item.image_url}'); background-size:cover; opacity:0.4;"></div>` : ''}
                                <div style="position:relative; z-index:1;">
                                    <h3 style="font-family:'Restweek',serif; font-size:2rem; color:#C48B71; margin:0 0 10px 0;">${item.title || ''}</h3>
                                    <p style="color:#ddd; margin:0; line-height:1.4;">${item.description || ''}</p>
                                </div>
                            </div>`;
                        });
                        html += `</div></div></section>`;
                    }
                });

                editor.setComponents(html);
                showToast("Layout antigo convertido com sucesso! Salve para persistir as mudanças.", "success");
            } catch(e) {
                console.error(e);
                showToast("Erro ao converter página antiga.", "error");
            }
        }

        async function savePageData() {
            showToast("Salvando...");
            const html = editor.getHtml();
            const css = editor.getCss();
            const projectData = editor.getProjectData(); // Saves everything (Undo stack, components, styles, etc)

            try {
                const { error } = await pagesDbClient.from('pages').update({
                    html_content: html,
                    css_content: css,
                    grapesjs_data: projectData
                }).eq('id', pageId);

                if(error) throw error;
                showToast("Layout salvo com sucesso!");
            } catch(e) {
                showToast("Erro ao salvar: " + e.message, "error");
            }
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
