<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Bull Prime Premium Admin</title>
    <link rel="stylesheet" href="../../css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ===== FONTS ===== */
        @font-face {
            font-family: 'Lato';
            src: url('../../../public/Lato-Light.ttf') format('truetype');
        }
        @font-face {
            font-family: 'Restweek';
            src: url('../../../public/Restweek.otf') format('opentype');
        }

        /* ===== BLOG PAGE SPECIFIC STYLES ===== */

        .blog-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 28px 36px;
            border-bottom: 1px solid var(--admin-border, rgba(255,255,255,0.06));
        }
        .blog-topbar-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--admin-text, #fff);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .blog-topbar-title i {
            color: var(--admin-accent, #c48b71);
            font-size: 1.1rem;
        }
        .blog-topbar-title span {
            color: var(--admin-text-muted, #888);
            font-weight: 400;
            font-size: 0.95rem;
        }
        .btn-new-post {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            background: linear-gradient(135deg, var(--admin-accent, #c48b71), var(--admin-accent-hover, #d4a08a));
            color: #0a0908;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.8px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            box-shadow: 0 4px 20px rgba(196,139,113,0.3);
        }
        .btn-new-post:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(196,139,113,0.45);
        }

        /* ===== BLOG GRID ===== */
        .blog-grid-container {
            padding: 30px 36px;
        }
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        /* ===== BLOG CARD ===== */
        .blog-card {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            background: var(--admin-card-bg, rgba(20,17,14,0.6));
            border: 1px solid var(--admin-border, rgba(255,255,255,0.06));
            transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
            cursor: pointer;
        }
        .blog-card:hover {
            transform: translateY(-4px);
            border-color: rgba(196,139,113,0.25);
            box-shadow: 0 16px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(196,139,113,0.1);
        }
        .blog-card-cover {
            position: relative;
            width: 100%;
            height: 200px;
            background-size: cover;
            background-position: center;
            background-color: rgba(20,17,14,0.8);
        }
        .blog-card-cover::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 30%, rgba(10,9,8,0.95) 100%);
        }
        .blog-card-badges {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 2;
            display: flex;
            gap: 8px;
        }
        .badge-status {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            backdrop-filter: blur(12px);
        }
        .badge-status.published {
            background: rgba(72,187,120,0.2);
            color: #48bb78;
            border: 1px solid rgba(72,187,120,0.3);
        }
        .badge-status.draft {
            background: rgba(236,201,75,0.2);
            color: #ecc94b;
            border: 1px solid rgba(236,201,75,0.3);
        }
        .badge-featured {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 2;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(196,139,113,0.25);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(196,139,113,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #c48b71;
            font-size: 0.75rem;
        }
        .blog-card-body {
            padding: 20px;
            position: relative;
            margin-top: -40px;
            z-index: 2;
        }
        .blog-card-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--admin-text, #fff);
            margin-bottom: 8px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .blog-card-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.78rem;
            color: var(--admin-text-muted, #888);
        }
        .blog-card-meta i {
            font-size: 0.7rem;
            color: var(--admin-accent, #c48b71);
        }
        .blog-card-actions {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            gap: 0;
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.3s ease;
            border-top: 1px solid var(--admin-border, rgba(255,255,255,0.06));
        }
        .blog-card:hover .blog-card-actions {
            opacity: 1;
            transform: translateY(0);
        }
        .blog-card-actions button {
            flex: 1;
            padding: 12px;
            background: rgba(20,17,14,0.8);
            backdrop-filter: blur(10px);
            border: none;
            color: var(--admin-text-muted, #888);
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .blog-card-actions button:hover {
            background: rgba(196,139,113,0.15);
            color: var(--admin-accent, #c48b71);
        }
        .blog-card-actions button.btn-delete:hover {
            background: rgba(245,101,101,0.15);
            color: #f56565;
        }
        .blog-card-actions button:not(:last-child) {
            border-right: 1px solid var(--admin-border, rgba(255,255,255,0.06));
        }

        /* ===== EMPTY STATE ===== */
        .blog-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            text-align: center;
        }
        .blog-empty-icon {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(196,139,113,0.08);
            border: 1px solid rgba(196,139,113,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            color: var(--admin-accent, #c48b71);
            margin-bottom: 24px;
        }
        .blog-empty h3 {
            font-size: 1.3rem;
            color: var(--admin-text, #fff);
            margin-bottom: 8px;
        }
        .blog-empty p {
            color: var(--admin-text-muted, #888);
            font-size: 0.9rem;
            max-width: 400px;
        }

        /* ===== GLASS MODAL ===== */
        .blog-modal-glass {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.35s ease, visibility 0.35s ease;
        }
        .blog-modal-glass.active {
            opacity: 1;
            visibility: visible;
        }
        .blog-modal-glass .modal-content {
            width: 90%;
            max-width: 850px;
            max-height: 90vh;
            overflow-y: auto;
            background: rgba(12, 10, 8, 0.65);
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow:
                0 40px 100px rgba(0, 0, 0, 0.8),
                inset 0 1px 1px rgba(255, 255, 255, 0.1),
                0 0 0 1px rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 0;
            transform: scale(0.92);
            opacity: 0;
            transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.35s ease;
        }
        .blog-modal-glass.active .modal-content {
            transform: scale(1);
            opacity: 1;
        }

        /* scrollbar for modal */
        .blog-modal-glass .modal-content::-webkit-scrollbar {
            width: 6px;
        }
        .blog-modal-glass .modal-content::-webkit-scrollbar-track {
            background: transparent;
        }
        .blog-modal-glass .modal-content::-webkit-scrollbar-thumb {
            background: rgba(196,139,113,0.3);
            border-radius: 10px;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px 32px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .modal-header h2 {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--admin-text, #fff);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .modal-header h2 i {
            color: var(--admin-accent, #c48b71);
        }
        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--admin-text-muted, #888);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }
        .modal-close:hover {
            background: rgba(245,101,101,0.15);
            color: #f56565;
            border-color: rgba(245,101,101,0.3);
        }
        .modal-body {
            padding: 28px 32px;
        }

        /* ===== FORM FIELDS ===== */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-group.full-width {
            grid-column: 1 / -1;
        }
        .form-group label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--admin-text-muted, #888);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 11px 14px;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: var(--admin-text, #fff);
            font-size: 0.88rem;
            transition: all 0.25s ease;
            outline: none;
            font-family: inherit;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: rgba(196,139,113,0.5);
            box-shadow: 0 0 15px rgba(196,139,113,0.15);
            background: rgba(255,255,255,0.06);
        }
        .form-group select option {
            background: #1a1614;
            color: #fff;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        .cover-preview {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .cover-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .cover-preview i {
            color: var(--admin-text-muted, #888);
            font-size: 1rem;
        }
        .cover-input-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        .cover-input-row input {
            flex: 1;
        }

        /* ===== TOGGLE SWITCH ===== */
        .toggle-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-top: 6px;
        }
        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
            flex-shrink: 0;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
            position: absolute;
        }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: rgba(255,255,255,0.08);
            border-radius: 24px;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .toggle-slider::before {
            content: '';
            position: absolute;
            height: 18px;
            width: 18px;
            left: 2px;
            bottom: 2px;
            background: var(--admin-text-muted, #888);
            border-radius: 50%;
            transition: 0.3s;
        }
        .toggle-switch input:checked + .toggle-slider {
            background: rgba(196,139,113,0.3);
            border-color: rgba(196,139,113,0.5);
        }
        .toggle-switch input:checked + .toggle-slider::before {
            transform: translateX(20px);
            background: var(--admin-accent, #c48b71);
        }
        .toggle-label {
            font-size: 0.85rem;
            color: var(--admin-text-muted, #888);
        }

        /* ===== RICH TEXT EDITOR ===== */
        .blog-editor-toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 4px;
            padding: 8px 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px 12px 0 0;
            border-bottom: none;
        }
        .toolbar-separator {
            width: 1px;
            height: 24px;
            background: rgba(255,255,255,0.08);
            margin: 0 4px;
        }
        .toolbar-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: transparent;
            border: 1px solid transparent;
            color: var(--admin-text-muted, #888);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s ease;
        }
        .toolbar-btn:hover {
            background: rgba(196,139,113,0.12);
            color: var(--admin-accent, #c48b71);
            border-color: rgba(196,139,113,0.2);
        }
        .toolbar-btn.active {
            background: rgba(196,139,113,0.2);
            color: var(--admin-accent, #c48b71);
        }
        .toolbar-select {
            padding: 4px 8px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            color: var(--admin-text, #fff);
            font-size: 0.75rem;
            cursor: pointer;
            outline: none;
            transition: all 0.2s ease;
        }
        .toolbar-select:hover, .toolbar-select:focus {
            border-color: rgba(196,139,113,0.3);
        }
        .toolbar-select option {
            background: #1a1614;
            color: #fff;
        }
        .blog-editor-content {
            min-height: 300px;
            max-height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: rgba(255,255,255,0.015);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 0 0 12px 12px;
            color: var(--admin-text, #fff);
            font-size: 0.92rem;
            line-height: 1.7;
            outline: none;
            transition: all 0.25s ease;
        }
        .blog-editor-content:focus {
            border-color: rgba(196,139,113,0.4);
            box-shadow: inset 0 0 10px rgba(196,139,113,0.05), 0 0 15px rgba(196,139,113,0.15);
            background: rgba(255,255,255,0.03);
        }
        .blog-editor-content:empty::before {
            content: 'Escreva o conteúdo do seu post...';
            color: rgba(255,255,255,0.2);
        }
        .blog-editor-content::-webkit-scrollbar {
            width: 5px;
        }
        .blog-editor-content::-webkit-scrollbar-track {
            background: transparent;
        }
        .blog-editor-content::-webkit-scrollbar-thumb {
            background: rgba(196,139,113,0.2);
            border-radius: 10px;
        }
        .blog-editor-content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 10px 0;
        }
        .blog-editor-content blockquote {
            border-left: 3px solid var(--admin-accent, #c48b71);
            padding-left: 16px;
            margin: 12px 0;
            color: var(--admin-text-muted, #888);
            font-style: italic;
        }

        /* ===== MODAL FOOTER ===== */
        .modal-footer {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 12px;
            padding: 20px 32px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .btn-cancel {
            padding: 11px 24px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: var(--admin-text-muted, #888);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-cancel:hover {
            background: rgba(255,255,255,0.08);
            color: var(--admin-text, #fff);
        }
        .btn-save {
            padding: 11px 28px;
            background: linear-gradient(135deg, var(--admin-accent, #c48b71), var(--admin-accent-hover, #d4a08a));
            border: none;
            border-radius: 10px;
            color: #0a0908;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 16px rgba(196,139,113,0.3);
        }
        .btn-save:hover {
            box-shadow: 0 8px 28px rgba(196,139,113,0.45);
            transform: translateY(-1px);
        }

        /* ===== PREVIEW MODAL ===== */
        .preview-modal {
            position: fixed;
            inset: 0;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .preview-modal.active {
            opacity: 1;
            visibility: visible;
        }
        .preview-modal .preview-content {
            width: 90%;
            max-width: 780px;
            max-height: 90vh;
            overflow-y: auto;
            background: #fafafa;
            border-radius: 20px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            transform: scale(0.94);
            opacity: 0;
            transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease;
        }
        .preview-modal.active .preview-content {
            transform: scale(1);
            opacity: 1;
        }
        .preview-cover {
            width: 100%;
            height: 300px;
            background-size: cover;
            background-position: center;
            border-radius: 20px 20px 0 0;
            position: relative;
        }
        .preview-cover::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.3));
            border-radius: 20px 20px 0 0;
        }
        .preview-close-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 5;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }
        .preview-close-btn:hover {
            background: rgba(245,101,101,0.6);
        }
        .preview-body {
            padding: 36px 40px;
            color: #1a1a1a;
        }
        .preview-body h1 {
            font-family: 'Restweek', serif;
            font-size: 2.2rem;
            color: #0a0908;
            margin-bottom: 16px;
            line-height: 1.2;
        }
        .preview-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .preview-meta i {
            color: #c48b71;
        }
        .preview-article {
            font-size: 1rem;
            line-height: 1.8;
            color: #333;
        }
        .preview-article img {
            max-width: 100%;
            border-radius: 8px;
            margin: 16px 0;
        }
        .preview-article blockquote {
            border-left: 3px solid #c48b71;
            padding-left: 16px;
            margin: 16px 0;
            color: #666;
            font-style: italic;
        }
        .preview-article h2 {
            font-size: 1.5rem;
            color: #0a0908;
            margin: 24px 0 12px;
        }
        .preview-article h3 {
            font-size: 1.2rem;
            color: #0a0908;
            margin: 20px 0 10px;
        }

        /* ===== TOAST ===== */
        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            border-radius: 12px;
            background: rgba(12,10,8,0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
            color: var(--admin-text, #fff);
            font-size: 0.85rem;
            animation: toastIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
            min-width: 280px;
        }
        .toast.success .toast-icon { color: #48bb78; }
        .toast.error .toast-icon { color: #f56565; }
        .toast.warning .toast-icon { color: #ecc94b; }
        .toast-icon {
            font-size: 1.1rem;
            flex-shrink: 0;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(40px) scale(0.95); }
            to { opacity: 1; transform: translateX(0) scale(1); }
        }

        /* ===== LOADING ===== */
        .blog-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
        }
        .blog-loading .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(196,139,113,0.15);
            border-top-color: var(--admin-accent, #c48b71);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .blog-topbar {
                flex-direction: column;
                gap: 16px;
                align-items: stretch;
                padding: 20px;
            }
            .blog-grid-container { padding: 20px; }
            .blog-grid { grid-template-columns: 1fr; }
            .form-grid { grid-template-columns: 1fr; }
            .blog-modal-glass .modal-content { width: 95%; max-width: none; }
            .modal-body { padding: 20px; }
            .modal-header, .modal-footer { padding: 16px 20px; }
            .preview-body { padding: 24px 20px; }
        }
    </style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<div class="admin-layout">
    <!-- ===== SIDEBAR ===== -->
    <aside class="admin-sidebar">
        <div class="sidebar-logo">
            <img src="/public/logo.png" style="height:40px; filter: drop-shadow(0 0 10px rgba(196,139,113,0.5));" alt="Bull Prime">
        </div>
        <nav class="sidebar-nav">
                <div class="sidebar-section-label">PRINCIPAL</div>
                <a href="dashboard.html" class="sidebar-link "><i class="fas fa-chart-line"></i> Dashboard</a>
                <a href="pages.html" class="sidebar-link "><i class="fas fa-file-alt"></i> Páginas</a>
                <a href="navbar.html" class="sidebar-link "><i class="fas fa-bars"></i> Navbar</a>
                <div class="sidebar-section-label">CONTEÚDO</div>
                <a href="blog.html" class="sidebar-link active"><i class="fas fa-pen-nib"></i> Blog</a>
                <div class="sidebar-section-label">NEGÓCIOS</div>
                <a href="contacts.html" class="sidebar-link "><i class="fas fa-envelope"></i> Mensagens</a>
                <div class="sidebar-section-label">SISTEMA</div>
                <a href="settings.html" class="sidebar-link "><i class="fas fa-cog"></i> Configurações</a>
            </nav>
    </aside>

    <!-- ===== MAIN ===== -->
    <main class="admin-main">
        <div class="blog-topbar">
            <div class="blog-topbar-title">
                <i class="fas fa-blog"></i>
                Blog <span>/ Journal</span>
            </div>
            <button class="btn-new-post" onclick="openModal()">
                <i class="fas fa-plus"></i> NOVO POST
            </button>
        </div>

        <div class="blog-grid-container">
            <div class="blog-loading" id="blogLoading">
                <div class="spinner"></div>
            </div>
            <div class="blog-grid" id="blogGrid" style="display:none;"></div>
        </div>
    </main>
</div>

<!-- ===== CREATE / EDIT MODAL ===== -->
<div class="blog-modal-glass" id="blogModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2><i class="fas fa-pen-nib"></i> <span id="modalTitle">Novo Post</span></h2>
            <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="postId">

            <div class="form-grid">
                <!-- Title -->
                <div class="form-group full-width">
                    <label for="postTitle">Título</label>
                    <input type="text" id="postTitle" placeholder="Título do post" oninput="generateSlug()" required>
                </div>

                <!-- Slug -->
                <div class="form-group full-width">
                    <label for="postSlug">Slug</label>
                    <input type="text" id="postSlug" placeholder="url-do-post" required>
                </div>

                <!-- Cover Image -->
                <div class="form-group">
                    <label>Imagem de Capa</label>
                    <div class="cover-input-row">
                        <input type="text" id="postCover" placeholder="URL da imagem de capa" oninput="updateCoverPreview()">
                        <div class="cover-preview" id="coverPreview">
                            <i class="fas fa-image"></i>
                        </div>
                    </div>
                </div>

                <!-- Status -->
                <div class="form-group">
                    <label for="postStatus">Status</label>
                    <select id="postStatus">
                        <option value="draft">Rascunho</option>
                        <option value="published">Publicado</option>
                    </select>
                </div>

                <!-- Author -->
                <div class="form-group">
                    <label for="postAuthor">Autor</label>
                    <input type="text" id="postAuthor" placeholder="Autor" value="Bull Prime">
                </div>

                <!-- Tags -->
                <div class="form-group">
                    <label for="postTags">Tags</label>
                    <input type="text" id="postTags" placeholder="tag1, tag2, tag3">
                </div>

                <!-- Excerpt -->
                <div class="form-group full-width">
                    <label for="postExcerpt">Resumo / Excerpt</label>
                    <textarea id="postExcerpt" placeholder="Breve resumo do post..." rows="3"></textarea>
                </div>

                <!-- Featured toggle -->
                <div class="form-group full-width">
                    <label>Destaque na Home?</label>
                    <div class="toggle-row">
                        <label class="toggle-switch">
                            <input type="checkbox" id="postFeatured">
                            <span class="toggle-slider"></span>
                        </label>
                        <span class="toggle-label">Marcar como destaque na página inicial</span>
                    </div>
                </div>

                <!-- Rich Text Editor -->
                <div class="form-group full-width">
                    <label>Conteúdo</label>
                    <div class="blog-editor-toolbar">
                        <select class="toolbar-select" id="fontSelector" onchange="changeFont(this.value)" title="Fonte">
                            <option value="Lato">Lato</option>
                            <option value="Restweek">Restweek</option>
                        </select>
                        <select class="toolbar-select" id="fontSizeSelector" onchange="changeFontSize(this.value)" title="Tamanho">
                            <option value="3">Normal</option>
                            <option value="5">Grande</option>
                            <option value="7">Extra Grande</option>
                        </select>
                        <div class="toolbar-separator"></div>
                        <button type="button" class="toolbar-btn" onclick="execFormat('bold')" title="Negrito"><b>B</b></button>
                        <button type="button" class="toolbar-btn" onclick="execFormat('italic')" title="Itálico"><i>I</i></button>
                        <button type="button" class="toolbar-btn" onclick="execFormat('underline')" title="Sublinhado"><u>U</u></button>
                        <div class="toolbar-separator"></div>
                        <button type="button" class="toolbar-btn" onclick="execFormat('formatBlock','<h2>')" title="Título H2"><i class="fas fa-heading"></i>2</button>
                        <button type="button" class="toolbar-btn" onclick="execFormat('formatBlock','<h3>')" title="Título H3"><i class="fas fa-heading"></i>3</button>
                        <div class="toolbar-separator"></div>
                        <button type="button" class="toolbar-btn" onclick="execFormat('insertUnorderedList')" title="Lista"><i class="fas fa-list-ul"></i></button>
                        <button type="button" class="toolbar-btn" onclick="execFormat('insertOrderedList')" title="Lista numerada"><i class="fas fa-list-ol"></i></button>
                        <button type="button" class="toolbar-btn" onclick="insertLink()" title="Link"><i class="fas fa-link"></i></button>
                        <button type="button" class="toolbar-btn" onclick="execFormat('formatBlock','<blockquote>')" title="Citação"><i class="fas fa-quote-left"></i></button>
                        <button type="button" class="toolbar-btn" onclick="insertImage()" title="Inserir Imagem"><i class="fas fa-image"></i></button>
                        <div class="toolbar-separator"></div>
                        <button type="button" class="toolbar-btn" onclick="execFormat('removeFormat')" title="Limpar formatação"><i class="fas fa-eraser"></i></button>
                    </div>
                    <div class="blog-editor-content" contenteditable="true" id="postContent"></div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
            <button class="btn-save" onclick="savePost()"><i class="fas fa-save"></i> Salvar Post</button>
        </div>
    </div>
</div>

<!-- ===== PREVIEW MODAL ===== -->
<div class="preview-modal" id="previewModal">
    <div class="preview-content">
        <div class="preview-cover" id="previewCover">
            <button class="preview-close-btn" onclick="closePreview()"><i class="fas fa-times"></i></button>
        </div>
        <div class="preview-body">
            <h1 id="previewTitle"></h1>
            <div class="preview-meta">
                <span><i class="fas fa-user"></i> <span id="previewAuthor"></span></span>
                <span><i class="fas fa-calendar-alt"></i> <span id="previewDate"></span></span>
            </div>
            <div class="preview-article" id="previewArticle"></div>
        </div>
    </div>
</div>

<script src="../../js/supabase.js"></script>
<script>
let blogClient;

// ===== INIT & LOAD DATA =====
async function initAdminBlog() {
    let attempts = 0;
    while ((!window.BullPrimeDB || !window.BullPrimeDB.client) && attempts < 30) {
        await new Promise(r => setTimeout(r, 100));
        attempts++;
    }
    
    if (window.BullPrimeDB && window.BullPrimeDB.client) {
        blogClient = window.BullPrimeDB.client;
        checkAuth().then(loadPosts);
    } else {
        showToast('Erro ao inicializar o banco de dados. Tente atualizar a página.', 'error');
    }
}

let allPosts = [];

// ===== AUTH =====
async function checkAuth() {
    if (!blogClient) return;
    try {
        const { data: { session } } = await blogClient.auth.getSession();
        if (!session) {
            window.location.href = 'login.html';
        }
    } catch (e) {
        console.error('Auth error:', e);
        window.location.href = 'login.html';
    }
}

async function logout() {
    if (!blogClient) return;
    try {
        await blogClient.auth.signOut();
    } catch (e) {
        console.error(e);
    }
    window.location.href = 'login.html';
}

// ===== TOAST =====
function showToast(message, type = 'success') {
    const container = document.getElementById('toastContainer');
    const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle' };
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `<i class="fas ${icons[type] || icons.success} toast-icon"></i><span>${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(40px)';
        toast.style.transition = 'all 0.3s ease';
        setTimeout(() => toast.remove(), 300);
    }, 3500);
}

// ===== SLUG GENERATOR =====
function generateSlug() {
    const title = document.getElementById('postTitle').value;
    const slug = title
        .toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9\s-]/g, '')
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-')
        .replace(/^-|-$/g, '');
    document.getElementById('postSlug').value = slug;
}

// ===== COVER PREVIEW =====
function updateCoverPreview() {
    const url = document.getElementById('postCover').value;
    const preview = document.getElementById('coverPreview');
    if (url && url.startsWith('http')) {
        preview.innerHTML = `<img src="${url}" alt="Cover" onerror="this.outerHTML='<i class=\\'fas fa-image\\'></i>'">`;
    } else {
        preview.innerHTML = '<i class="fas fa-image"></i>';
    }
}

// ===== RICH TEXT EDITOR =====
function execFormat(command, value = null) {
    document.execCommand(command, false, value);
    document.getElementById('postContent').focus();
}

function insertLink() {
    const url = prompt('Digite a URL do link:');
    if (url) {
        document.execCommand('createLink', false, url);
        document.getElementById('postContent').focus();
    }
}

function insertImage() {
    const url = prompt('Digite a URL da imagem:');
    if (url) {
        document.execCommand('insertImage', false, url);
        document.getElementById('postContent').focus();
    }
}

function changeFont(fontName) {
    document.execCommand('fontName', false, fontName);
    document.getElementById('postContent').focus();
}

function changeFontSize(size) {
    document.execCommand('fontSize', false, size);
    document.getElementById('postContent').focus();
}

// ===== MODAL =====
function openModal(post = null) {
    const modal = document.getElementById('blogModal');
    document.getElementById('modalTitle').textContent = post ? 'Editar Post' : 'Novo Post';

    if (post) {
        document.getElementById('postId').value = post.id;
        document.getElementById('postTitle').value = post.title || '';
        document.getElementById('postSlug').value = post.slug || '';
        document.getElementById('postCover').value = post.cover_image || '';
        document.getElementById('postStatus').value = post.status || 'draft';
        document.getElementById('postAuthor').value = post.author || 'Bull Prime';
        document.getElementById('postTags').value = (post.tags || []).join(', ');
        document.getElementById('postExcerpt').value = post.excerpt || '';
        document.getElementById('postContent').innerHTML = post.content || '';
        document.getElementById('postFeatured').checked = post.is_featured || false;
        updateCoverPreview();
    } else {
        document.getElementById('postId').value = '';
        document.getElementById('postTitle').value = '';
        document.getElementById('postSlug').value = '';
        document.getElementById('postCover').value = '';
        document.getElementById('postStatus').value = 'draft';
        document.getElementById('postAuthor').value = 'Bull Prime';
        document.getElementById('postTags').value = '';
        document.getElementById('postExcerpt').value = '';
        document.getElementById('postContent').innerHTML = '';
        document.getElementById('postFeatured').checked = false;
        document.getElementById('coverPreview').innerHTML = '<i class="fas fa-image"></i>';
    }

    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    const modal = document.getElementById('blogModal');
    modal.classList.remove('active');
    document.body.style.overflow = '';
}

// ===== LOAD POSTS =====
async function loadPosts() {
    const grid = document.getElementById('blogGrid');
    const loading = document.getElementById('blogLoading');

    if (!blogClient) {
        loading.style.display = 'none';
        grid.style.display = 'block';
        grid.innerHTML = renderEmpty();
        return;
    }

    try {
        const { data, error } = await blogClient
            .from('blog_posts')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) throw error;

        allPosts = data || [];
        loading.style.display = 'none';
        grid.style.display = '';

        if (allPosts.length === 0) {
            grid.innerHTML = renderEmpty();
            return;
        }

        grid.innerHTML = allPosts.map(post => renderCard(post)).join('');
    } catch (e) {
        console.error('Load posts error:', e);
        loading.style.display = 'none';
        grid.style.display = '';
        grid.innerHTML = renderEmpty();
        showToast('Erro ao carregar posts', 'error');
    }
}

function renderEmpty() {
    return `
        <div class="blog-empty" style="grid-column: 1 / -1;">
            <div class="blog-empty-icon"><i class="fas fa-feather-alt"></i></div>
            <h3>Nenhum post encontrado</h3>
            <p>Comece criando seu primeiro post para o blog da Bull Prime.</p>
        </div>
    `;
}

function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
}

function renderCard(post) {
    const coverStyle = post.cover_image
        ? `background-image: url('${post.cover_image}')`
        : `background: linear-gradient(135deg, rgba(196,139,113,0.15), rgba(20,17,14,0.9))`;

    const statusClass = post.status === 'published' ? 'published' : 'draft';
    const statusText = post.status === 'published' ? 'Publicado' : 'Rascunho';
    const statusIcon = post.status === 'published' ? 'fa-check-circle' : 'fa-pencil-alt';

    return `
        <div class="blog-card">
            <div class="blog-card-cover" style="${coverStyle}">
                <div class="blog-card-badges">
                    <span class="badge-status ${statusClass}"><i class="fas ${statusIcon}"></i> ${statusText}</span>
                </div>
                ${post.is_featured ? '<div class="badge-featured"><i class="fas fa-star"></i></div>' : ''}
            </div>
            <div class="blog-card-body">
                <div class="blog-card-title">${post.title || 'Sem título'}</div>
                <div class="blog-card-meta">
                    <span><i class="fas fa-user"></i> ${post.author || 'Bull Prime'}</span>
                    <span><i class="fas fa-calendar-alt"></i> ${formatDate(post.created_at)}</span>
                </div>
            </div>
            <div class="blog-card-actions">
                <button onclick="previewPost(allPosts.find(p=>p.id==='${post.id}'))" title="Visualizar"><i class="fas fa-eye"></i> Preview</button>
                <button onclick="openModal(allPosts.find(p=>p.id==='${post.id}'))" title="Editar"><i class="fas fa-pen"></i> Editar</button>
                <button class="btn-delete" onclick="deletePost('${post.id}')" title="Excluir"><i class="fas fa-trash-alt"></i> Excluir</button>
            </div>
        </div>
    `;
}

// ===== SAVE POST =====
async function savePost() {
    if (!blogClient) {
        showToast('Supabase não inicializado', 'error');
        return;
    }

    const id = document.getElementById('postId').value;
    const title = document.getElementById('postTitle').value.trim();
    const slug = document.getElementById('postSlug').value.trim();
    const cover_image = document.getElementById('postCover').value.trim();
    const status = document.getElementById('postStatus').value;
    const author = document.getElementById('postAuthor').value.trim() || 'Bull Prime';
    const tagsRaw = document.getElementById('postTags').value.trim();
    const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];
    const excerpt = document.getElementById('postExcerpt').value.trim();
    const content = document.getElementById('postContent').innerHTML;
    const is_featured = document.getElementById('postFeatured').checked;

    if (!title) { showToast('Título é obrigatório', 'warning'); return; }
    if (!slug) { showToast('Slug é obrigatório', 'warning'); return; }

    const postData = {
        title,
        slug,
        content,
        excerpt,
        cover_image,
        author,
        status,
        tags,
        is_featured,
        updated_at: new Date().toISOString()
    };

    try {
        let result;
        if (id) {
            result = await blogClient.from('blog_posts').update(postData).eq('id', id);
        } else {
            result = await blogClient.from('blog_posts').insert([postData]);
        }

        if (result.error) throw result.error;

        showToast(id ? 'Post atualizado com sucesso!' : 'Post criado com sucesso!', 'success');
        closeModal();
        await loadPosts();
    } catch (e) {
        console.error('Save error:', e);
        showToast(`Erro ao salvar: ${e.message}`, 'error');
    }
}

// ===== DELETE POST =====
async function deletePost(id) {
    if (!confirm('Tem certeza que deseja excluir este post? Esta ação não pode ser desfeita.')) return;
    if (!blogClient) return;

    try {
        const { error } = await blogClient.from('blog_posts').delete().eq('id', id);
        if (error) throw error;
        showToast('Post excluído com sucesso!', 'success');
        await loadPosts();
    } catch (e) {
        console.error('Delete error:', e);
        showToast(`Erro ao excluir: ${e.message}`, 'error');
    }
}

// ===== PREVIEW POST =====
function previewPost(post) {
    if (!post) return;
    const modal = document.getElementById('previewModal');
    const cover = document.getElementById('previewCover');

    if (post.cover_image) {
        cover.style.backgroundImage = `url('${post.cover_image}')`;
        cover.style.display = '';
    } else {
        cover.style.backgroundImage = `linear-gradient(135deg, #c48b71 0%, #0a0908 100%)`;
        cover.style.height = '120px';
    }

    document.getElementById('previewTitle').textContent = post.title || 'Sem título';
    document.getElementById('previewAuthor').textContent = post.author || 'Bull Prime';
    document.getElementById('previewDate').textContent = formatDate(post.created_at);
    document.getElementById('previewArticle').innerHTML = post.content || '<p>Sem conteúdo.</p>';

    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closePreview() {
    const modal = document.getElementById('previewModal');
    modal.classList.remove('active');
    document.body.style.overflow = '';
    // reset cover height
    document.getElementById('previewCover').style.height = '300px';
}

// ===== CLOSE MODALS ON OVERLAY CLICK =====
document.getElementById('blogModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});
document.getElementById('previewModal').addEventListener('click', function(e) {
    if (e.target === this) closePreview();
});

// ===== CLOSE ON ESCAPE =====
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        if (document.getElementById('previewModal').classList.contains('active')) {
            closePreview();
        } else if (document.getElementById('blogModal').classList.contains('active')) {
            closeModal();
        }
    }
});

// ===== INIT =====
initAdminBlog();
</script>
<script src="../../js/admin-sidebar.js"></script>
</body>
</html>
