<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Bull Prime Premium Admin</title>
    <link rel="stylesheet" href="../../css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        .blog-card {
            position: relative;
            height: 250px;
            border-radius: var(--radius-lg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 1.5rem;
        }
        .blog-card-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            z-index: 1;
            transition: transform 0.5s var(--ease-cinematic);
        }
        .blog-card:hover .blog-card-bg {
            transform: scale(1.05);
        }
        .blog-card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.2));
            z-index: 2;
        }
        .blog-card-content {
            position: relative;
            z-index: 3;
        }
        .blog-card-title {
            font-size: 1.25rem;
            font-weight: 300;
            margin-bottom: 0.5rem;
        }
        .blog-card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.875rem;
            color: var(--admin-text-muted);
        }
        .blog-actions {
            position: absolute;
            top: 1rem;
            right: 1rem;
            z-index: 4;
            display: flex;
            gap: 0.5rem;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .blog-card:hover .blog-actions {
            opacity: 1;
        }
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .tag-badge {
            background: rgba(196, 139, 113, 0.2);
            color: var(--admin-accent);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="sidebar-logo">
                <img src="/public/logo.png" style="height:40px; filter: drop-shadow(0 0 10px rgba(196,139,113,0.5));" alt="Bull Prime">
            </div>
            
            <nav class="sidebar-nav">
                <div class="sidebar-section-label">PRINCIPAL</div>
                <a href="dashboard.html" class="sidebar-link"><i class="fas fa-chart-line"></i> Dashboard</a>
                <a href="pages.html" class="sidebar-link"><i class="fas fa-file-alt"></i> Páginas</a>
                <a href="media.html" class="sidebar-link"><i class="fas fa-images"></i> Mídia</a>
                
                <div class="sidebar-section-label">CONTEÚDO</div>
                <a href="blog.html" class="sidebar-link active"><i class="fas fa-blog"></i> Blog</a>
                <a href="cuts.html" class="sidebar-link"><i class="fas fa-drumstick-bite"></i> Catálogo</a>
                
                <div class="sidebar-section-label">NEGÓCIOS</div>
                <a href="units.html" class="sidebar-link"><i class="fas fa-store"></i> Unidades</a>
                <a href="events.html" class="sidebar-link"><i class="fas fa-calendar-alt"></i> Eventos</a>
                <a href="contacts.html" class="sidebar-link"><i class="fas fa-envelope"></i> Mensagens</a>
                
                <div class="sidebar-section-label">SISTEMA</div>
                <a href="settings.html" class="sidebar-link"><i class="fas fa-cog"></i> Configurações</a>
                <a href="#" class="sidebar-link" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sair</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <div class="admin-topbar">
                <h2>Blog / Journal</h2>
                <button class="btn btn-primary" onclick="openModal()"><i class="fas fa-plus"></i> Novo Post</button>
            </div>

            <div id="blogGrid" class="blog-grid">
                <!-- Posts will be loaded here -->
                <div class="empty-state" style="grid-column: 1 / -1;">
                    <div class="loading-spinner"></div>
                    <p class="mt-2">Carregando posts...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Form -->
    <div class="modal-overlay" id="postModal">
        <div class="modal-content" style="max-width: 700px;">
            <div class="modal-header">
                <h3 id="modalTitle">Novo Post</h3>
                <button class="btn-icon" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <form id="postForm">
                    <input type="hidden" id="postId">
                    <div class="form-group">
                        <label class="form-label">Título</label>
                        <input type="text" id="postTitle" class="form-input" required oninput="generateSlug()">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Slug</label>
                        <input type="text" id="postSlug" class="form-input" required>
                    </div>
                    <div class="flex gap-2">
                        <div class="form-group" style="flex: 1;">
                            <label class="form-label">Imagem de Capa (URL)</label>
                            <input type="url" id="postImage" class="form-input">
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label class="form-label">Status</label>
                            <select id="postStatus" class="form-select">
                                <option value="draft">Rascunho</option>
                                <option value="published">Publicado</option>
                            </select>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <div class="form-group" style="flex: 1;">
                            <label class="form-label">Autor</label>
                            <input type="text" id="postAuthor" class="form-input" value="Bull Prime">
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label class="form-label">Tags (separadas por vírgula)</label>
                            <input type="text" id="postTags" class="form-input" placeholder="ex: churrasco, premium, dicas">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Resumo (Excerpt)</label>
                        <textarea id="postExcerpt" class="form-textarea" style="min-height: 60px;"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Conteúdo</label>
                        <textarea id="postContent" class="form-textarea" style="min-height: 200px;" required></textarea>
                    </div>
                    <div class="form-group" style="flex-direction: row; align-items: center; justify-content: space-between;">
                        <label class="form-label">Destaque na Home?</label>
                        <label class="form-switch">
                            <input type="checkbox" id="postFeatured">
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
                <button class="btn btn-primary" onclick="savePost()">Salvar</button>
            </div>
        </div>
    </div>

    <!-- Preview Modal -->
    <div class="modal-overlay" id="previewModal">
        <div class="modal-content" style="max-width: 800px;">
            <div class="modal-header">
                <h3>Preview</h3>
                <button class="btn-icon" onclick="closePreview()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" style="background: white; color: black; border-radius: 8px; margin: 1rem;">
                <img id="previewImg" style="width: 100%; height: 300px; object-fit: cover; border-radius: 8px 8px 0 0;" src="" alt="">
                <div style="padding: 2rem;">
                    <h1 id="previewTitle" style="font-family: 'Restweek', serif; margin-bottom: 1rem; color: #0a0908;"></h1>
                    <div style="color: #666; margin-bottom: 2rem; font-size: 0.9rem;">
                        <span id="previewAuthor"></span> &bull; <span id="previewDate"></span>
                    </div>
                    <div id="previewContent" style="line-height: 1.8;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vtkinxncxptlqspdzsbi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0a2lueG5jeHB0bHFzcGR6c2JpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzOTg4NjgsImV4cCI6MjA5OTk3NDg2OH0.tuUwIBLFjKz3o0gQVHU1lZDDUNq1-_N80Ds2_lOA8Kw';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
            }
        }

        async function logout() {
            await supabase.auth.signOut();
            window.location.href = 'login.html';
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('hiding');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function generateSlug() {
            const title = document.getElementById('postTitle').value;
            const slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');
            document.getElementById('postSlug').value = slug;
        }

        function openModal(post = null) {
            const modal = document.getElementById('postModal');
            document.getElementById('modalTitle').innerText = post ? 'Editar Post' : 'Novo Post';
            
            if (post) {
                document.getElementById('postId').value = post.id;
                document.getElementById('postTitle').value = post.title || '';
                document.getElementById('postSlug').value = post.slug || '';
                document.getElementById('postImage').value = post.cover_image || '';
                document.getElementById('postStatus').value = post.status || 'draft';
                document.getElementById('postAuthor').value = post.author || 'Bull Prime';
                document.getElementById('postTags').value = post.tags ? post.tags.join(', ') : '';
                document.getElementById('postExcerpt').value = post.excerpt || '';
                document.getElementById('postContent').value = post.content || '';
                document.getElementById('postFeatured').checked = post.is_featured || false;
            } else {
                document.getElementById('postForm').reset();
                document.getElementById('postId').value = '';
                document.getElementById('postAuthor').value = 'Bull Prime';
            }
            
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('postModal').classList.remove('active');
        }

        async function loadPosts() {
            const grid = document.getElementById('blogGrid');
            grid.innerHTML = '<div class="empty-state" style="grid-column: 1 / -1;"><div class="loading-spinner"></div></div>';
            
            const { data, error } = await supabase
                .from('blog_posts')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                showToast('Erro ao carregar posts: ' + error.message, 'error');
                grid.innerHTML = '<div class="empty-state" style="grid-column: 1 / -1;">Erro ao carregar dados.</div>';
                return;
            }

            if (!data || data.length === 0) {
                grid.innerHTML = '<div class="empty-state" style="grid-column: 1 / -1;"><i class="fas fa-folder-open"></i><p>Nenhum post encontrado.</p></div>';
                return;
            }

            grid.innerHTML = data.map(post => `
                <div class="admin-card blog-card" style="padding:0;">
                    <div class="blog-card-bg" style="background-image: url('${post.cover_image || '/public/placeholder.jpg'}')"></div>
                    <div class="blog-card-overlay"></div>
                    <div class="blog-actions">
                        <button class="btn-icon" style="background: rgba(0,0,0,0.5);" onclick='previewPost(${JSON.stringify(post).replace(/'/g, "&#39;")})'><i class="fas fa-eye"></i></button>
                        <button class="btn-icon" style="background: rgba(0,0,0,0.5);" onclick='openModal(${JSON.stringify(post).replace(/'/g, "&#39;")})'><i class="fas fa-edit"></i></button>
                        <button class="btn-icon" style="background: rgba(248,113,113,0.5); color: #f87171;" onclick="deletePost('${post.id}')"><i class="fas fa-trash"></i></button>
                    </div>
                    <div class="blog-card-content" style="padding: 1.5rem;">
                        <span class="badge ${post.status === 'published' ? 'success' : 'warning'}" style="margin-bottom: 0.5rem; display: inline-block;">${post.status === 'published' ? 'Publicado' : 'Rascunho'}</span>
                        ${post.is_featured ? '<span class="badge" style="background: var(--admin-accent); color: #fff; margin-bottom: 0.5rem; display: inline-block; margin-left: 0.5rem;"><i class="fas fa-star"></i></span>' : ''}
                        <h3 class="blog-card-title">${post.title}</h3>
                        <div class="blog-card-meta">
                            <span>${new Date(post.created_at).toLocaleDateString('pt-BR')}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function savePost() {
            const id = document.getElementById('postId').value;
            const title = document.getElementById('postTitle').value;
            const slug = document.getElementById('postSlug').value;
            
            if (!title || !slug) {
                showToast('Título e Slug são obrigatórios', 'warning');
                return;
            }

            const postData = {
                title,
                slug,
                cover_image: document.getElementById('postImage').value,
                status: document.getElementById('postStatus').value,
                author: document.getElementById('postAuthor').value,
                tags: document.getElementById('postTags').value.split(',').map(t => t.trim()).filter(t => t),
                excerpt: document.getElementById('postExcerpt').value,
                content: document.getElementById('postContent').value,
                is_featured: document.getElementById('postFeatured').checked
            };

            let error;
            if (id) {
                const res = await supabase.from('blog_posts').update(postData).eq('id', id);
                error = res.error;
            } else {
                const res = await supabase.from('blog_posts').insert([postData]);
                error = res.error;
            }

            if (error) {
                showToast('Erro ao salvar: ' + error.message, 'error');
            } else {
                showToast('Post salvo com sucesso!');
                closeModal();
                loadPosts();
            }
        }

        async function deletePost(id) {
            if (confirm('Tem certeza que deseja excluir este post?')) {
                const { error } = await supabase.from('blog_posts').delete().eq('id', id);
                if (error) {
                    showToast('Erro ao excluir: ' + error.message, 'error');
                } else {
                    showToast('Post excluído!');
                    loadPosts();
                }
            }
        }

        function previewPost(post) {
            document.getElementById('previewImg').src = post.cover_image || '/public/placeholder.jpg';
            document.getElementById('previewTitle').innerText = post.title;
            document.getElementById('previewAuthor').innerText = post.author || 'Bull Prime';
            document.getElementById('previewDate').innerText = new Date(post.created_at).toLocaleDateString('pt-BR');
            
            // Basic markdown/newline to HTML conversion for preview
            let contentHTML = (post.content || '').replace(/\n/g, '<br>');
            document.getElementById('previewContent').innerHTML = contentHTML;
            
            document.getElementById('previewModal').classList.add('active');
        }

        function closePreview() {
            document.getElementById('previewModal').classList.remove('active');
        }

        // Init
        checkAuth().then(loadPosts);
    </script>
</body>
</html>
