<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bull Prime Premium - Admin Login</title>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- CSS -->
    <link rel="stylesheet" href="../../css/admin.css">
    
    <style>
        @font-face {
            font-family: 'Restweek';
            src: url('../../public/Restweek.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Lato';
            src: url('../../public/Lato-Light.ttf') format('truetype');
            font-weight: 300;
            font-style: normal;
            font-display: swap;
        }

        body {
            background: #050403 radial-gradient(circle at center, rgba(196, 139, 113, 0.1) 0%, transparent 60%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 3rem 2rem;
            text-align: center;
        }

        .login-logo {
            font-family: 'Restweek', serif;
            font-size: 3rem;
            color: var(--admin-accent);
            margin-bottom: 2rem;
            text-shadow: 0 0 20px rgba(196, 139, 113, 0.3);
        }

        .login-form {
            text-align: left;
        }

        .login-btn {
            width: 100%;
            margin-top: 1rem;
            height: 50px;
        }
        
        .loading-text {
            display: none;
        }
        
        .is-loading .btn-text {
            display: none;
        }
        
        .is-loading .loading-text {
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>

    <div class="admin-card login-card">
        <div class="login-logo">Bull Prime</div>
        
        <form id="loginForm" class="login-form">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-input" placeholder="admin@bullprime.com">
            </div>
            
            <div class="form-group mb-4">
                <label class="form-label">Senha</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••">
            </div>
            
            <button type="submit" id="loginBtn" class="btn btn-primary login-btn">
                <span class="btn-text">ENTRAR</span>
                <span class="loading-text">
                    <div class="loading-spinner"></div>
                </span>
            </button>
        </form>
    </div>

    <script>
        // 1. Funções Auxiliares Seguras
        function showToast(message, type = 'error') {
            const container = document.getElementById('toastContainer');
            if (!container) return;
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('hiding');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // 2. Proteção Absoluta do Formulário (Obrigatório vir antes de qualquer inicialização)
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('loginForm');
            if (form) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault(); // Impede o envio do form (e recarregamento com ?)
                    
                    const email = document.getElementById('email').value.trim();
                    const password = document.getElementById('password').value.trim();
                    
                    if (!email || !password) {
                        showToast('Por favor, preencha o e-mail e a senha.', 'warning');
                        return;
                    }

                    if (!window.supabaseClient) {
                        showToast('Sistema carregando ou indisponível. Verifique sua conexão.', 'error');
                        return;
                    }

                    const btn = document.getElementById('loginBtn');
                    btn.classList.add('is-loading');
                    btn.disabled = true;

                    try {
                        const { data, error } = await window.supabaseClient.auth.signInWithPassword({
                            email,
                            password
                        });

                        if (error) {
                            showToast('Credenciais inválidas. Tente novamente.', 'error');
                        } else {
                            showToast('Login bem-sucedido!', 'success');
                            setTimeout(() => {
                                window.location.href = 'dashboard.html';
                            }, 500);
                        }
                    } catch (err) {
                        console.error('Login error:', err);
                        showToast('Erro ao conectar ao servidor. Tente novamente.', 'error');
                    } finally {
                        btn.classList.remove('is-loading');
                        btn.disabled = false;
                    }
                });
            }

            // 3. Inicialização do Supabase (Apenas após proteger o formulário)
            try {
                const SUPABASE_URL = 'https://vtkinxncxptlqspdzsbi.supabase.co';
                const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0a2lueG5jeHB0bHFzcGR6c2JpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzOTg4NjgsImV4cCI6MjA5OTk3NDg2OH0.tuUwIBLFjKz3o0gQVHU1lZDDUNq1-_N80Ds2_lOA8Kw';
                
                if (window.supabase) {
                    window.supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                    
                    // Verifica se já está logado
                    window.supabaseClient.auth.getSession().then(({ data: { session } }) => {
                        if (session) window.location.href = 'dashboard.html';
                    }).catch(err => console.error("Session check failed:", err));
                } else {
                    console.error("Supabase script failed to load via CDN.");
                    showToast('O sistema não conseguiu carregar. Recarregue a página.', 'warning');
                }
            } catch (initErr) {
                console.error("Supabase init error:", initErr);
            }
        });
    </script>
</body>
</html>
